<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contactos — Vista Cards</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --family:  #38a169;
      --work:    #3182ce;
      --friend:  #dd6b20;
      --bg:      #f7f8fc;
      --surface: #ffffff;
      --text:    #1a202c;
      --muted:   #718096;
      --border:  #e2e8f0;
      --accent:  #6c63ff;
      --danger:  #e53e3e;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--accent);
      color: #fff;
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(108,99,255,.35);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-left .logo { font-size: 1.5rem; }

    header h1 {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: .3px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .tag {
      background: rgba(255,255,255,.18);
      padding: 3px 10px;
      border-radius: 20px;
      font-size: .72rem;
      letter-spacing: .5px;
    }

    /* ── TOOLBAR ── */
    .toolbar {
      max-width: 1100px;
      margin: 28px auto 0;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .toolbar-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toolbar-title h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
    }

    .count-badge {
      background: var(--accent);
      color: #fff;
      font-size: .72rem;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: 20px;
      min-width: 28px;
      text-align: center;
    }

    .toolbar-actions {
      display: flex;
      gap: 10px;
    }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border: none;
      border-radius: 10px;
      font-size: .87rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .18s;
      white-space: nowrap;
    }

    .btn:disabled { opacity: .55; cursor: not-allowed; transform: none !important; }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 8px rgba(108,99,255,.3);
    }
    .btn-primary:hover:not(:disabled) {
      background: #5a52d5;
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(108,99,255,.4);
    }

    .btn-ghost {
      background: var(--surface);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover:not(:disabled) {
      background: var(--border);
      color: var(--text);
    }

    .btn-outline-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
    }
    .btn-outline-danger:hover:not(:disabled) {
      background: #fff5f5;
    }

    /* ── NOTIFICATION ── */
    #notification {
      max-width: 1100px;
      margin: 12px auto 0;
      padding: 0 24px;
    }

    .notif {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: .87rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: fadeIn .25s ease;
    }
    .notif-success { background: #f0fff4; border: 1px solid #9ae6b4; color: #276749; }
    .notif-error   { background: #fff5f5; border: 1px solid #fed7d7; color: var(--danger); }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }

    /* ── CARDS GRID ── */
    .grid-container {
      max-width: 1100px;
      margin: 20px auto 40px;
      padding: 0 24px;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 20px;
    }

    .state-message {
      grid-column: 1/-1;
      text-align: center;
      padding: 56px 20px;
      color: var(--muted);
      font-size: .95rem;
    }
    .state-message .icon { font-size: 2.5rem; margin-bottom: 10px; display: block; }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border-radius: 14px;
      padding: 20px 20px 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
      border-top: 4px solid var(--border);
      transition: transform .15s, box-shadow .15s;
      position: relative;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,.11); }

    .card.cat-family { border-top-color: var(--family); }
    .card.cat-work   { border-top-color: var(--work);   }
    .card.cat-friend { border-top-color: var(--friend); }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.1rem;
      color: #fff;
      flex-shrink: 0;
    }
    .cat-family .avatar { background: var(--family); }
    .cat-work   .avatar { background: var(--work);   }
    .cat-friend .avatar { background: var(--friend); }

    .fav-star {
      font-size: 1.3rem;
      color: #f6ad55;
      line-height: 1;
    }
    .fav-star.off { color: #e2e8f0; }

    .card-name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }

    .card-id {
      font-size: .7rem;
      color: #a0aec0;
    }

    .card-row {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: .85rem;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .card-row .icon { font-size: .9rem; }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: .71rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .chip-family { background: #c6f6d5; color: #276749; }
    .chip-work   { background: #bee3f8; color: #2a69ac; }
    .chip-friend { background: #feebc8; color: #9c4221; }

    .fav-label {
      font-size: .72rem;
      color: #d97706;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 3px;
    }

    /* ── SPINNER ── */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    .spinner-dark {
      border-color: rgba(0,0,0,.15);
      border-top-color: var(--muted);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MODAL OVERLAY ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
      animation: fadeIn .2s ease;
    }
    .overlay.open { display: flex; }

    /* ── MODAL ── */
    .modal {
      background: var(--surface);
      border-radius: 18px;
      padding: 32px;
      width: 100%;
      max-width: 460px;
      margin: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,.22);
      animation: slideUp .25s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: none; }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .modal-header h2 {
      font-size: 1.15rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-close {
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: var(--muted);
      line-height: 1;
      padding: 2px 6px;
      border-radius: 6px;
      transition: background .15s;
    }
    .btn-close:hover { background: var(--border); }

    /* ── FORM ── */
    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: .78rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: .9rem;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color .18s;
    }
    .form-group input:focus,
    .form-group select:focus { border-color: var(--accent); background: #fff; }

    /* category toggle buttons */
    .cat-buttons {
      display: flex;
      gap: 8px;
    }
    .cat-btn {
      flex: 1;
      padding: 9px 6px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: .83rem;
      font-weight: 600;
      background: var(--bg);
      cursor: pointer;
      transition: all .15s;
      text-align: center;
    }
    .cat-btn:hover { border-color: #a0aec0; }
    .cat-btn.active-family { border-color: var(--family); background: #f0fff4; color: var(--family); }
    .cat-btn.active-work   { border-color: var(--work);   background: #ebf8ff; color: var(--work);   }
    .cat-btn.active-friend { border-color: var(--friend); background: #fffaf0; color: var(--friend); }

    /* favorite toggle switch */
    .switch-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .switch-label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: .9rem;
      color: var(--text);
    }

    .switch {
      position: relative;
      width: 44px;
      height: 24px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .switch-track {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 999px;
      cursor: pointer;
      transition: background .2s;
    }
    .switch-track::after {
      content: '';
      position: absolute;
      left: 3px;
      top: 3px;
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s;
      box-shadow: 0 1px 4px rgba(0,0,0,.2);
    }
    .switch input:checked + .switch-track { background: #f6ad55; }
    .switch input:checked + .switch-track::after { transform: translateX(20px); }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }
    .modal-actions .btn { flex: 1; justify-content: center; }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 18px;
      color: #a0aec0;
      font-size: .75rem;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-left">
    <span class="logo">🗂️</span>
    <h1>Contacts App</h1>
  </div>
  <div class="header-right">
    <span class="tag">Cards View · Puerto 3001</span>
    <span class="tag">Backend: localhost:3000</span>
  </div>
</header>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="toolbar-title">
    <h2>Contactos</h2>
    <span class="count-badge" id="countBadge">–</span>
  </div>
  <div class="toolbar-actions">
    <button class="btn btn-ghost" id="refreshBtn" onclick="loadContacts()">
      <span id="refreshIcon">🔄</span> Actualizar
    </button>
    <button class="btn btn-primary" onclick="openModal()">
      ➕ Nuevo contacto
    </button>
  </div>
</div>

<!-- NOTIFICATION -->
<div id="notification"></div>

<!-- CARDS GRID -->
<div class="grid-container">
  <div class="cards-grid" id="cardsGrid">
    <div class="state-message">
      <span class="icon">⏳</span>
      Cargando contactos…
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  Frontend: Cards View &nbsp;·&nbsp;
  Consume: <strong>GET /contacts</strong> &nbsp;&amp;&nbsp; <strong>POST /contacts</strong> &nbsp;·&nbsp;
  Backend: <strong>http://localhost:3000</strong>
</footer>

<!-- ═══════════════════════════════ MODAL ═══════════════════════════════ -->
<div class="overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">

    <div class="modal-header">
      <h2>👤 Nuevo contacto</h2>
      <button class="btn-close" onclick="closeModal()" title="Cerrar">✕</button>
    </div>

    <form id="contactForm" onsubmit="handleSubmit(event)">

      <!-- NAME -->
      <div class="form-group">
        <label>👤 Nombre</label>
        <input
          type="text"
          id="f-name"
          placeholder="Nombre completo"
          autocomplete="off"
          required
          minlength="2"
        />
      </div>

      <!-- PHONE -->
      <div class="form-group">
        <label>📞 Teléfono</label>
        <input
          type="text"
          id="f-phone"
          placeholder="+56912345678"
          autocomplete="off"
          required
        />
      </div>

      <!-- CATEGORY -->
      <div class="form-group">
        <label>🏷️ Categoría</label>
        <div class="cat-buttons">
          <button type="button" class="cat-btn active-family" data-cat="family" onclick="selectCategory('family')">🏠 Familia</button>
          <button type="button" class="cat-btn"               data-cat="work"   onclick="selectCategory('work')">💼 Trabajo</button>
          <button type="button" class="cat-btn"               data-cat="friend" onclick="selectCategory('friend')">🤝 Amigo</button>
        </div>
        <input type="hidden" id="f-category" value="family" />
      </div>

      <!-- FAVORITE -->
      <div class="form-group">
        <div class="switch-row">
          <span class="switch-label">⭐ Marcar como favorito</span>
          <label class="switch">
            <input type="checkbox" id="f-favorite" />
            <span class="switch-track"></span>
          </label>
        </div>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        <button type="submit" class="btn btn-primary" id="submitBtn">
          💾 Guardar contacto
        </button>
      </div>

    </form>
  </div>
</div>

<!-- ═══════════════════════════════ SCRIPT ═══════════════════════════════ -->
<script>
  const API = 'http://localhost:3000';

  // ── utilidades ───────────────────────────────────────────────────────
  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function initials(name) {
    return name.trim().split(/\s+/).slice(0, 2).map(w => w[0].toUpperCase()).join('');
  }

  function showNotif(msg, type = 'success') {
    const el = document.getElementById('notification');
    el.innerHTML = `
      <div class="notif notif-${type}">
        ${type === 'success' ? '✅' : '❌'} ${msg}
      </div>`;
    setTimeout(() => { el.innerHTML = ''; }, 4000);
  }

  // ── renderizado de tarjetas ──────────────────────────────────────────
  function renderCards(contacts) {
    const grid = document.getElementById('cardsGrid');
    document.getElementById('countBadge').textContent = contacts.length;

    if (!contacts.length) {
      grid.innerHTML = `
        <div class="state-message">
          <span class="icon">📭</span>
          No hay contactos todavía.<br>¡Crea el primero!
        </div>`;
      return;
    }

    const catIcon = { family: '🏠', work: '💼', friend: '🤝' };
    const catLabel = { family: 'Familia', work: 'Trabajo', friend: 'Amigo' };

    grid.innerHTML = contacts.map(c => `
      <div class="card cat-${c.category}">
        <div class="card-top">
          <div class="avatar">${esc(initials(c.name))}</div>
          <span class="fav-star ${c.favorite ? '' : 'off'}" title="${c.favorite ? 'Favorito' : 'No favorito'}">★</span>
        </div>
        <div class="card-name">${esc(c.name)}</div>
        <div class="card-id">ID #${c.id}</div>

        <div class="card-row" style="margin-top:12px">
          <span class="icon">📞</span> ${esc(c.phone)}
        </div>

        <div class="card-footer">
          <span class="chip chip-${c.category}">${catIcon[c.category]} ${catLabel[c.category]}</span>
          ${c.favorite ? '<span class="fav-label">⭐ Favorito</span>' : ''}
        </div>
      </div>
    `).join('');
  }

  // ── cargar contactos ─────────────────────────────────────────────────
  async function loadContacts() {
    const btn = document.getElementById('refreshBtn');
    const icon = document.getElementById('refreshIcon');

    btn.disabled = true;
    icon.innerHTML = '<span class="spinner spinner-dark"></span>';

    document.getElementById('cardsGrid').innerHTML = `
      <div class="state-message">
        <span class="icon">⏳</span> Consultando el backend…
      </div>`;
    document.getElementById('countBadge').textContent = '–';

    try {
      const res = await fetch(`${API}/contacts`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      renderCards(data);
    } catch (err) {
      document.getElementById('cardsGrid').innerHTML = `
        <div class="state-message">
          <span class="icon">⚠️</span>
          No se pudo conectar al backend.<br>
          <small>${esc(err.message)}</small>
        </div>`;
      document.getElementById('countBadge').textContent = '!';
    } finally {
      btn.disabled = false;
      icon.textContent = '🔄';
    }
  }

  // ── modal de creación ────────────────────────────────────────────────
  function openModal() {
    document.getElementById('contactForm').reset();
    selectCategory('family');
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('f-name').focus(), 100);
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });

  // ── selector de categoría ────────────────────────────────────────────
  function selectCategory(cat) {
    document.querySelectorAll('.cat-btn').forEach(btn => {
      btn.className = 'cat-btn';
      if (btn.dataset.cat === cat) btn.classList.add(`active-${cat}`);
    });
    document.getElementById('f-category').value = cat;
  }

  // ── envío del formulario ─────────────────────────────────────────────
  async function handleSubmit(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Guardando…';

    const body = {
      name:     document.getElementById('f-name').value.trim(),
      phone:    document.getElementById('f-phone').value.trim(),
      category: document.getElementById('f-category').value,
      favorite: document.getElementById('f-favorite').checked,
    };

    try {
      const res = await fetch(`${API}/contacts`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(body),
      });

      if (!res.ok) {
        const err = await res.json();
        const msgs = Array.isArray(err.message) ? err.message.join(', ') : err.message;
        throw new Error(msgs || `HTTP ${res.status}`);
      }

      const created = await res.json();
      closeModal();
      showNotif(`Contacto <strong>${esc(created.name)}</strong> creado con éxito ✨`);
      loadContacts();
    } catch (err) {
      showNotif(`Error al guardar: ${esc(err.message)}`, 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '💾 Guardar contacto';
    }
  }

  // ── inicio ───────────────────────────────────────────────────────────
  loadContacts();
</script>

</body>
</html>
